<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking Update Deskripsi</title>
    <!-- Memuat Grist API -->
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <!-- Memuat Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Konfigurasi Tailwind untuk Dark Mode
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gristDarkBg: '#262633',
                        gristDarkPanel: '#2b2b36',
                        gristDarkBorder: '#3e3e4a',
                        gristDarkText: '#EFEFEF',
                        gristDarkMuted: '#A4A4A4',
                    }
                }
            }
        }
    </script>
    <style>
        /* Tipografi & Scrollbar */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Liberation Sans", Helvetica, Arial, sans-serif;
        }

        ::-webkit-scrollbar {
            height: 10px;
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f7f7f7;
            border-left: 1px solid #d9d9d9;
            border-top: 1px solid #d9d9d9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cccccc;
            border: 2px solid #f7f7f7;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a6a6a6;
        }

        .dark ::-webkit-scrollbar-track {
            background: #262633;
            border-color: #3e3e4a;
            border-top: none;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #4b4b5a;
            border: 2px solid #262633;
        }

        .dark ::-webkit-scrollbar-thumb:hover {
            background: #66667a;
        }

        /* Kustomisasi Textarea */
        textarea {
            resize: vertical;
            min-height: 80px;
        }
    </style>
</head>

<body
    class="bg-white dark:bg-gristDarkBg m-0 p-0 h-screen flex flex-col text-[#262633] dark:text-gristDarkText transition-colors duration-200">
    <div class="w-full bg-white dark:bg-gristDarkBg flex flex-col h-full transition-colors duration-200">

        <!-- Header & Navigasi -->
        <div
            class="border-b border-[#d9d9d9] dark:border-gristDarkBorder py-2.5 px-4 flex justify-between items-center bg-white dark:bg-gristDarkBg z-10 flex-wrap gap-4 transition-colors duration-200">
            <div>
                <h2 class="text-[15px] font-semibold text-[#262633] dark:text-gristDarkText">Project Update Tracker</h2>
                <p class="text-[11px] text-[#929299] dark:text-gristDarkMuted mt-0.5">Edit progress/deskripsi secara
                    berkala. Perubahan akan dipetakan ke database.</p>
            </div>

            <div class="flex gap-2 items-center">
                <button type="button" id="theme-toggle"
                    class="text-[#929299] dark:text-gristDarkMuted hover:bg-[#f7f7f7] dark:hover:bg-gristDarkPanel hover:text-[#262633] dark:hover:text-gristDarkText p-1.5 rounded transition duration-150 mr-2"
                    title="Ganti Tema">
                    <svg id="theme-toggle-light-icon" class="hidden w-4 h-4" fill="currentColor" viewBox="0 0 20 20"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
                            fill-rule="evenodd" clip-rule="evenodd"></path>
                    </svg>
                    <svg id="theme-toggle-dark-icon" class="hidden w-4 h-4" fill="currentColor" viewBox="0 0 20 20"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                    </svg>
                </button>
                <button type="button" id="save-btn"
                    class="bg-[#16b378] hover:bg-[#139a67] text-white font-medium py-1.5 px-3 rounded text-[13px] transition duration-150 flex items-center gap-1.5 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    Simpan Perubahan
                </button>
            </div>
        </div>

        <!-- Status Panel -->
        <div id="loading-panel"
            class="flex-grow flex flex-col items-center justify-center text-center p-6 text-gray-500 dark:text-gristDarkMuted transition-colors duration-200">
            <p id="loading-text" class="text-[13px] font-medium">Memproses data dari Grist...</p>
            <div id="error-box"
                class="hidden mt-4 text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/30 p-4 rounded border border-red-200 dark:border-red-800 text-left max-w-lg text-[13px]">
            </div>
        </div>

        <!-- Table Data Grid -->
        <div id="table-container"
            class="hidden flex-grow overflow-auto p-0 relative bg-[#f7f7f7] dark:bg-[#1e1e24] transition-colors duration-200">
            <table class="w-full border-collapse text-sm bg-white dark:bg-gristDarkBg transition-colors duration-200">
                <thead class="sticky top-0 z-20 shadow-sm">
                    <tr id="table-head"></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <!-- SCRIPT (MODULAR) -->
    <script>
        // ==========================================
        // 1. CONFIG
        // ==========================================
        const Config = {
            tableId: 'Yoko_journey',          // Sesuaikan dengan nama tabel di Grist
            colCompany: 'Company_Name', // ID Kolom Company Name di Grist
            colSKU: 'SKU_Grade',        // ID Kolom SKU/Grade di Grist
            colDate: 'Date',            // ID Kolom Date (contoh: JUNE'24)
            colDesc: 'Deskripsi'        // ID Kolom Deskripsi/Notes
        };

        const AppState = {
            allRecords: [],
            uniqueDates: [],
            uniqueRowGroups: [], // Berisi objek {company, sku}
            unsavedEdits: {}
        };

        // ==========================================
        // 2. UTILS
        // ==========================================
        const Utils = {
            // Pengurutan custom untuk format "JUNE'24"
            monthOrder: { "JANUARY": 1, "FEBRUARY": 2, "MARCH": 3, "APRIL": 4, "MAY": 5, "JUNE": 6, "JULY": 7, "AUGUST": 8, "SEPTEMBER": 9, "OCTOBER": 10, "NOVEMBER": 11, "DECEMBER": 12 },

            parseDateToNumber(dStr) {
                if (!dStr) return 0;
                let str = String(dStr).trim().toUpperCase();
                let parts = str.split("'");
                if (parts.length === 2) {
                    let m = this.monthOrder[parts[0]] || 0;
                    let y = parseInt(parts[1], 10);
                    return (y * 100) + m; // cth: 2406
                }
                return 9999;
            },

            sortDates(datesArray) {
                return datesArray.sort((a, b) => this.parseDateToNumber(a) - this.parseDateToNumber(b));
            }
        };

        // ==========================================
        // 3. UI MANAGER
        // ==========================================
        const UIManager = {
            els: {
                loadingPanel: document.getElementById('loading-panel'),
                tableContainer: document.getElementById('table-container'),
                errorBox: document.getElementById('error-box'),
                thead: document.getElementById('table-head'),
                tbody: document.getElementById('table-body'),
                saveBtn: document.getElementById('save-btn')
            },

            showError(msg) {
                this.els.errorBox.innerHTML = msg;
                this.els.errorBox.classList.remove('hidden');
                this.els.loadingPanel.classList.remove('hidden');
                this.els.tableContainer.classList.add('hidden');
            },

            showTable() {
                this.els.loadingPanel.classList.add('hidden');
                this.els.errorBox.classList.add('hidden');
                this.els.tableContainer.classList.remove('hidden');
            },

            saveCurrentInputsToState() {
                const inputs = document.querySelectorAll('#table-body textarea');
                inputs.forEach(input => {
                    AppState.unsavedEdits[`${input.dataset.company}|${input.dataset.sku}|${input.dataset.date}`] = input.value;
                });
            },

            setSaveBtnState(state) {
                const btn = this.els.saveBtn;
                if (state === 'loading') {
                    btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Menyimpan...`;
                    btn.disabled = true;
                    btn.className = "bg-gray-400 text-white font-medium py-1.5 px-3 rounded text-[13px] flex items-center shadow-sm cursor-not-allowed";
                } else if (state === 'no-change') {
                    btn.innerHTML = 'Tidak ada perubahan';
                    btn.className = "bg-yellow-500 text-white font-medium py-1.5 px-3 rounded text-[13px] flex items-center shadow-sm";
                } else if (state === 'success') {
                    btn.innerHTML = `<svg class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg> Tersimpan`;
                    btn.className = "bg-[#16b378] text-white font-medium py-1.5 px-3 rounded text-[13px] flex items-center shadow-sm";
                } else if (state === 'error') {
                    btn.innerHTML = 'Gagal Disimpan';
                    btn.className = "bg-red-600 text-white font-medium py-1.5 px-3 rounded text-[13px] flex items-center shadow-sm";
                } else {
                    btn.innerHTML = `<svg class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg> Simpan Perubahan`;
                    btn.disabled = false;
                    btn.className = "bg-[#16b378] hover:bg-[#139a67] text-white font-medium py-1.5 px-3 rounded text-[13px] transition duration-150 flex items-center shadow-sm";
                }
            },

            renderTable() {
                this.els.thead.innerHTML = '';
                this.els.tbody.innerHTML = '';

                // Header Kiri (Frozen)
                let thCompany = document.createElement('th');
                thCompany.className = "bg-[#f7f7f7] dark:bg-gristDarkPanel text-[#929299] dark:text-gristDarkMuted text-[11px] uppercase tracking-wider font-semibold border border-[#d9d9d9] dark:border-gristDarkBorder p-3 text-left min-w-[250px] z-30 sticky left-0";
                thCompany.innerText = "Company Name";
                this.els.thead.appendChild(thCompany);

                let thSKU = document.createElement('th');
                thSKU.className = "bg-[#f7f7f7] dark:bg-gristDarkPanel text-[#929299] dark:text-gristDarkMuted text-[11px] uppercase tracking-wider font-semibold border border-[#d9d9d9] dark:border-gristDarkBorder p-3 text-left min-w-[200px] z-30 sticky left-[250px]";
                thSKU.innerText = "SKU / Grade";
                this.els.thead.appendChild(thSKU);

                // Header Tanggal Dinamis
                AppState.uniqueDates.forEach(date => {
                    let th = document.createElement('th');
                    th.className = "bg-[#f7f7f7] dark:bg-gristDarkPanel text-[#929299] dark:text-gristDarkMuted text-[11px] uppercase tracking-wider font-semibold border border-[#d9d9d9] dark:border-gristDarkBorder p-3 text-left min-w-[280px]";
                    th.innerText = date;
                    this.els.thead.appendChild(th);
                });

                // Isi Body (Baris Data)
                AppState.uniqueRowGroups.forEach(group => {
                    let tr = document.createElement('tr');

                    let tdCompany = document.createElement('td');
                    tdCompany.className = "bg-[#f7f7f7] dark:bg-gristDarkPanel text-[#262633] dark:text-gristDarkText text-[13px] font-medium border border-[#d9d9d9] dark:border-gristDarkBorder p-3 align-top sticky left-0 z-10 whitespace-normal";
                    tdCompany.innerText = group.company || '-';
                    tr.appendChild(tdCompany);

                    let tdSKU = document.createElement('td');
                    tdSKU.className = "bg-[#f7f7f7] dark:bg-gristDarkPanel text-[#262633] dark:text-gristDarkText text-[13px] font-medium border border-[#d9d9d9] dark:border-gristDarkBorder p-3 align-top sticky left-[250px] z-10 whitespace-normal";
                    tdSKU.innerText = group.sku || '-';
                    tr.appendChild(tdSKU);

                    AppState.uniqueDates.forEach(date => {
                        let td = document.createElement('td');
                        td.className = "p-0 relative h-full border border-[#d9d9d9] dark:border-gristDarkBorder bg-white dark:bg-gristDarkBg align-top";

                        let matched = AppState.allRecords.find(r => r[Config.colCompany] === group.company && r[Config.colSKU] === group.sku && r[Config.colDate] === date);
                        let val = matched && matched[Config.colDesc] !== null ? matched[Config.colDesc] : '';
                        let recordId = matched ? matched.id : '';

                        const editKey = `${group.company}|${group.sku}|${date}`;
                        if (AppState.unsavedEdits[editKey] !== undefined) val = AppState.unsavedEdits[editKey];

                        // Menggunakan Textarea untuk deskripsi panjang
                        let input = document.createElement('textarea');
                        input.className = "w-full h-full min-h-[80px] p-2 bg-transparent text-[13px] text-[#262633] dark:text-gristDarkText leading-relaxed focus:outline-none focus:ring-0 focus:shadow-[inset_0_0_0_2px_#1f78d1] focus:bg-blue-50/30 dark:focus:bg-[#1f78d1]/20";
                        input.value = val;
                        input.placeholder = "Tambahkan catatan...";
                        input.dataset.id = recordId;
                        input.dataset.date = date;
                        input.dataset.company = group.company;
                        input.dataset.sku = group.sku;

                        td.appendChild(input);
                        tr.appendChild(td);
                    });
                    this.els.tbody.appendChild(tr);
                });
            }
        };

        // ==========================================
        // 4. BUSINESS LOGIC
        // ==========================================
        const BusinessLogic = {
            processIncomingRecords(records) {
                if (!records || records.length === 0) {
                    UIManager.showError("Data kosong. Silakan isi beberapa baris di Grist.");
                    return;
                }

                const sample = records[0];
                if (!(Config.colCompany in sample) || !(Config.colSKU in sample) || !(Config.colDate in sample) || !(Config.colDesc in sample)) {
                    let cols = Object.keys(sample).filter(k => k !== 'id').join(', ');
                    UIManager.showError(`<b>Error Kolom:</b> Pastikan ID Kolom di Grist persis: ${Config.colCompany}, ${Config.colSKU}, ${Config.colDate}, ${Config.colDesc}. <br><br>Tersedia saat ini: ${cols}`);
                    return;
                }

                AppState.allRecords = records;

                // 1. Dapatkan tanggal unik & urutkan
                let rawDates = [...new Set(records.map(r => r[Config.colDate]))].filter(Boolean);
                AppState.uniqueDates = Utils.sortDates(rawDates);

                // 2. Dapatkan kombinasi unik Company + SKU
                const groupMap = new Map();
                records.forEach(r => {
                    const c = r[Config.colCompany] || '';
                    const s = r[Config.colSKU] || '';
                    if (c || s) {
                        groupMap.set(`${c}|${s}`, { company: c, sku: s });
                    }
                });
                AppState.uniqueRowGroups = Array.from(groupMap.values());

                UIManager.showTable();
                UIManager.renderTable();
            },

            generateSavePayload() {
                UIManager.saveCurrentInputsToState();

                const apiActions = [];
                const inputs = document.querySelectorAll('#table-body textarea');

                inputs.forEach(input => {
                    const id = parseInt(input.dataset.id);
                    const val = input.value.trim(); // Teks deskripsi

                    if (id) {
                        const original = AppState.allRecords.find(r => r.id === id);
                        if (original && String(original[Config.colDesc] || '').trim() !== val) {
                            apiActions.push(['UpdateRecord', Config.tableId, id, { [Config.colDesc]: val }]);
                        }
                    } else if (val !== '') {
                        // Hanya buat AddRecord jika sel kosong (tanpa ID) diketik tulisan baru
                        apiActions.push(['AddRecord', Config.tableId, null, {
                            [Config.colDate]: input.dataset.date,
                            [Config.colCompany]: input.dataset.company,
                            [Config.colSKU]: input.dataset.sku,
                            [Config.colDesc]: val
                        }]);
                    }
                });
                return apiActions;
            }
        };

        // ==========================================
        // 5. THEME MANAGER & INIT
        // ==========================================
        const ThemeManager = {
            init() {
                const btn = document.getElementById('theme-toggle');
                const darkIcon = document.getElementById('theme-toggle-dark-icon');
                const lightIcon = document.getElementById('theme-toggle-light-icon');

                if (document.documentElement.classList.contains('dark')) lightIcon.classList.remove('hidden');
                else darkIcon.classList.remove('hidden');

                btn.addEventListener('click', () => {
                    darkIcon.classList.toggle('hidden');
                    lightIcon.classList.toggle('hidden');
                    if (document.documentElement.classList.contains('dark')) {
                        document.documentElement.classList.remove('dark');
                        localStorage.setItem('color-theme', 'light');
                    } else {
                        document.documentElement.classList.add('dark');
                        localStorage.setItem('color-theme', 'dark');
                    }
                });
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            ThemeManager.init();

            grist.ready({ requiredAccess: 'full' });
            grist.onRecords(records => {
                BusinessLogic.processIncomingRecords(records);
            });

            document.getElementById('save-btn').addEventListener('click', async () => {
                const actions = BusinessLogic.generateSavePayload();
                if (actions.length === 0) {
                    UIManager.setSaveBtnState('no-change');
                    setTimeout(() => UIManager.setSaveBtnState('default'), 2000);
                    return;
                }

                try {
                    UIManager.setSaveBtnState('loading');
                    await grist.docApi.applyUserActions(actions);
                    AppState.unsavedEdits = {};
                    UIManager.setSaveBtnState('success');
                } catch (error) {
                    console.error(error);
                    UIManager.setSaveBtnState('error');
                    alert("Gagal menyimpan ke Grist: " + error.message);
                } finally {
                    setTimeout(() => UIManager.setSaveBtnState('default'), 2000);
                }
            });
        });
    </script>
</body>

</html>
