<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Update Sales</title>
    <!-- Memuat Grist API -->
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <!-- Memuat Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gristDarkBg: '#1e1e24',
                        gristDarkPanel: '#2b2b36',
                        gristDarkBorder: '#3e3e4a',
                        gristDarkText: '#EFEFEF',
                        gristDarkMuted: '#A4A4A4',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        ::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #4b4b5a;
        }

        .dark ::-webkit-scrollbar-thumb:hover {
            background: #66667a;
        }

        /* Kustomisasi Icon Kalender untuk Mode Gelap */
        .dark input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
        }
    </style>
</head>

<body
    class="bg-gray-50 dark:bg-gristDarkBg m-0 p-4 min-h-screen text-[#262633] dark:text-gristDarkText flex flex-col transition-colors duration-200">

    <!-- Top Bar Kecil -->
    <div class="flex justify-end mb-4">
        <button type="button" id="theme-toggle"
            class="text-gray-500 dark:text-gristDarkMuted hover:bg-gray-200 dark:hover:bg-gristDarkPanel p-2 rounded-full transition duration-150"
            title="Ganti Tema">
            <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path
                    d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z">
                </path>
            </svg>
            <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
            </svg>
        </button>
    </div>

    <!-- Main Form Container -->
    <div
        class="max-w-2xl mx-auto w-full bg-white dark:bg-gristDarkPanel rounded-xl shadow-lg border border-gray-200 dark:border-gristDarkBorder overflow-hidden">

        <div class="bg-blue-600 dark:bg-blue-800 px-6 py-4">
            <h2 class="text-lg font-bold text-white tracking-wide">Input Update Sales</h2>
            <p class="text-blue-100 text-xs mt-1">Silakan lengkapi laporan Anda di bawah ini.</p>
        </div>

        <!-- Skeleton Loading (Muncul sebelum terkoneksi Grist) -->
        <div id="skeleton-loading" class="p-6 space-y-4 animate-pulse">
            <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-1/4"></div>
            <div class="h-10 bg-gray-200 dark:bg-gray-700 rounded w-full"></div>
            <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-1/3 mt-6"></div>
            <div class="h-10 bg-gray-200 dark:bg-gray-700 rounded w-full"></div>
            <div class="h-24 bg-gray-200 dark:bg-gray-700 rounded w-full mt-6"></div>
        </div>

        <!-- Form Aktual -->
        <div id="form-content" class="p-6 hidden">

            <!-- Input 1: PIC (Sales) -->
            <div class="mb-5">
                <label class="block text-[13px] font-semibold text-gray-700 dark:text-gray-300 mb-1.5" for="pic-select">
                    PIC (Nama Sales) <span class="text-red-500">*</span>
                </label>
                <select id="pic-select"
                    class="w-full bg-gray-50 dark:bg-[#1e1e24] border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none transition-colors cursor-pointer">
                    <option value="" disabled selected>Memuat data...</option>
                </select>
            </div>

            <!-- Input 2: Customer & Product -->
            <div class="mb-5">
                <label class="block text-[13px] font-semibold text-gray-700 dark:text-gray-300 mb-1.5" for="cp-select">
                    Customer & Product <span class="text-red-500">*</span>
                </label>
                <select id="cp-select" disabled
                    class="w-full bg-gray-50 dark:bg-[#1e1e24] border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none transition-colors cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
                    <option value="" disabled selected>- Pilih PIC terlebih dahulu -</option>
                </select>
                <p class="text-[11px] text-gray-500 dark:text-gray-400 mt-1">Daftar ini akan otomatis difilter
                    berdasarkan Sales yang dipilih.</p>
            </div>

            <!-- Input 3: Periode (Date Picker) -->
            <div class="mb-5">
                <label class="block text-[13px] font-semibold text-gray-700 dark:text-gray-300 mb-1.5" for="date-input">
                    Periode <span class="text-red-500">*</span>
                </label>
                <input type="date" id="date-input"
                    class="w-full bg-gray-50 dark:bg-[#1e1e24] border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none transition-colors">
            </div>

            <!-- Input 4: Detail Update (Textarea) -->
            <div class="mb-6">
                <label class="block text-[13px] font-semibold text-gray-700 dark:text-gray-300 mb-1.5"
                    for="detail-input">
                    Detail Update <span class="text-red-500">*</span>
                </label>
                <textarea id="detail-input" rows="4" placeholder="Tuliskan perkembangan laporan di sini..."
                    class="w-full bg-gray-50 dark:bg-[#1e1e24] border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none transition-colors resize-y"></textarea>
            </div>

            <!-- Submit Button -->
            <button type="button" id="submit-btn"
                class="w-full bg-[#16b378] hover:bg-[#139a67] text-white font-semibold rounded-lg text-sm px-5 py-3 text-center transition-colors shadow-sm focus:ring-4 focus:outline-none focus:ring-green-300">
                Kirim / Simpan Data
            </button>

        </div>
    </div>

    <!-- Floating Toast Notification -->
    <div id="toast-notification"
        class="fixed bottom-5 right-5 flex items-center w-full max-w-xs p-4 space-x-3 text-white bg-green-600 rounded-lg shadow-xl opacity-0 translate-y-10 transition-all duration-300 hidden z-50">
        <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor"
            viewBox="0 0 20 20">
            <path
                d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 8.207-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L9 10.586l3.293-3.293a1 1 0 0 1 1.414 1.414Z" />
        </svg>
        <div id="toast-msg" class="text-sm font-medium tracking-wide">Data berhasil disimpan.</div>
    </div>

    <!-- Panggil File JS -->
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="ui.js"></script>
    <script src="logic.js"></script>
    <script src="main.js"></script>
</body>

</html>
