<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pivot Laporan Tahunan</title>
    <!-- Memuat Grist API -->
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <!-- Memuat Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Konfigurasi Tailwind untuk Dark Mode (Sama dengan app utama)
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gristDarkBg: '#262633',
                        gristDarkPanel: '#2b2b36',
                        gristDarkBorder: '#3e3e4a',
                        gristDarkText: '#EFEFEF',
                        gristDarkMuted: '#A4A4A4',
                    }
                }
            }
        }

        // Deteksi preferensi tema pengguna
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        ::-webkit-scrollbar {
            height: 10px;
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f7f7f7;
            border-left: 1px solid #d9d9d9;
            border-top: 1px solid #d9d9d9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cccccc;
            border: 2px solid #f7f7f7;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a6a6a6;
        }

        .dark ::-webkit-scrollbar-track {
            background: #262633;
            border-color: #3e3e4a;
            border-top: none;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #4b4b5a;
            border: 2px solid #262633;
        }
    </style>
</head>

<body
    class="bg-white dark:bg-gristDarkBg h-screen flex flex-col text-[#262633] dark:text-gristDarkText transition-colors duration-200">

    <!-- Top Bar -->
    <div
        class="border-b border-[#d9d9d9] dark:border-gristDarkBorder py-3 px-4 flex justify-between items-center bg-white dark:bg-gristDarkBg z-10 flex-wrap gap-4">
        <div>
            <h2 class="text-[16px] font-semibold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                Pivot Table: Ringkasan Tahunan
            </h2>
            <p class="text-[11px] text-[#929299] dark:text-gristDarkMuted mt-0.5">Agregasi nilai metrik (Sum)
                berdasarkan Tahun.</p>
        </div>
        <button type="button" id="theme-toggle"
            class="text-[#929299] dark:text-gristDarkMuted hover:bg-[#f7f7f7] dark:hover:bg-gristDarkPanel p-2 rounded transition duration-150">
            <!-- Ikon Light/Dark diatur oleh JS -->
            <span id="theme-icon">🌓</span>
        </button>
    </div>

    <!-- Status Panel (Loading) -->
    <div id="loading-panel"
        class="flex-grow flex flex-col items-center justify-center text-center p-6 text-gray-500 dark:text-gristDarkMuted">
        <svg class="animate-spin h-8 w-8 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none"
            viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
        </svg>
        <p class="text-[13px] font-medium">Memproses kalkulasi Pivot...</p>
    </div>

    <!-- Container Tabel Pivot -->
    <div id="pivot-container" class="hidden flex-grow overflow-auto p-4 bg-[#f7f7f7] dark:bg-[#1e1e24]">
        <div
            class="rounded-lg border border-[#d9d9d9] dark:border-gristDarkBorder overflow-hidden bg-white dark:bg-gristDarkBg shadow-sm">
            <table class="w-full border-collapse text-sm whitespace-nowrap">
                <thead class="bg-gray-50 dark:bg-gristDarkPanel" id="pivot-head">
                    <!-- Header akan di-render oleh JS -->
                </thead>
                <tbody id="pivot-body" class="divide-y divide-[#d9d9d9] dark:divide-gristDarkBorder">
                    <!-- Baris akan di-render oleh JS -->
                </tbody>
                <tfoot class="bg-gray-50 dark:bg-gristDarkPanel font-semibold" id="pivot-foot">
                    <!-- Grand Total Bawah akan di-render oleh JS -->
                </tfoot>
            </table>
        </div>
    </div>

    <script>
        // --- KONFIGURASI SAMA DENGAN WIDGET UTAMA ---
        const CONFIG = {
            colDate: 'Tanggal',
            colMetric: 'metrik',
            colValue: 'value',
        };

        // --- FUNGSI EKSTRAK TAHUN (DIPERBARUI) ---
        function extractYear(val) {
            if (val === null || val === undefined || val === '') return 'N/A';
            try {
                // Deteksi format array Grist (misal: ["d", 1704067200])
                if (Array.isArray(val) && val.length >= 2 && typeof val[1] === 'number') {
                    return String(new Date(val[1] * 1000).getUTCFullYear());
                }

                if (typeof val === 'string') {
                    // Deteksi paling handal: Cari 4 digit angka yang menyerupai tahun (19xx atau 20xx) di mana saja dalam string.
                    // Ini akan berhasil membaca format "MMMM YYYY" seperti "Januari 2024" atau "Februari 2025"
                    const yearMatch = val.match(/\b((?:19|20)\d{2})\b/);
                    if (yearMatch) return yearMatch[1];

                    // Deteksi 2 digit tahun di akhir string dengan spasi (contoh: "Januari 25")
                    const matchShort = val.match(/\s(\d{2})$/);
                    if (matchShort) return "20" + matchShort[1];

                    // Fallback terakhir ke parsing Date JS
                    let d = new Date(val);
                    if (!isNaN(d.getTime())) return String(d.getUTCFullYear());
                }
                if (typeof val === 'number') {
                    let d = new Date(val > 100000000000 ? val : val * 1000);
                    return String(d.getUTCFullYear());
                }
            } catch (e) { console.warn("Format tanggal gagal diparsing", val); }
            return 'Lainnya';
        }

        // --- LOGIKA PIVOT ---
        function processPivot(records) {
            const pivotData = {}; // Format: { 'Revenue': { '2024': 5000, '2025': 7000, 'Total': 12000 } }
            const yearsSet = new Set();
            const metricsSet = new Set();
            const grandTotalsByYear = {};
            let grandTotalAll = 0;

            // 1. Ekstrak dan Hitung Agregasi
            records.forEach(r => {
                const metric = r[CONFIG.colMetric];
                const rawDate = r[CONFIG.colDate];
                const value = Number(r[CONFIG.colValue]) || 0;

                if (!metric) return; // Lewati jika tidak ada metrik

                const year = extractYear(rawDate);
                yearsSet.add(year);
                metricsSet.add(metric);

                // Inisialisasi object jika belum ada
                if (!pivotData[metric]) pivotData[metric] = { Total: 0 };
                if (!pivotData[metric][year]) pivotData[metric][year] = 0;
                if (!grandTotalsByYear[year]) grandTotalsByYear[year] = 0;

                // Tambahkan nilai (SUM)
                pivotData[metric][year] += value;
                pivotData[metric].Total += value;

                grandTotalsByYear[year] += value;
                grandTotalAll += value;
            });

            // Urutkan Tahun
            const sortedYears = Array.from(yearsSet).sort();
            const sortedMetrics = Array.from(metricsSet).sort();

            renderPivotTable(pivotData, sortedYears, sortedMetrics, grandTotalsByYear, grandTotalAll);
        }

        // --- FUNGSI RENDER UI ---
        function renderPivotTable(pivotData, years, metrics, grandTotalsByYear, grandTotalAll) {
            const thead = document.getElementById('pivot-head');
            const tbody = document.getElementById('pivot-body');
            const tfoot = document.getElementById('pivot-foot');

            // Format angka agar rapi (ribuan)
            const fmt = (num) => new Intl.NumberFormat('id-ID').format(num);

            // 1. Render Header (Thead)
            let headHTML = `<tr>
                <th class="p-3 text-left text-xs font-semibold text-gray-500 dark:text-gristDarkMuted uppercase tracking-wider sticky left-0 bg-gray-50 dark:bg-gristDarkPanel z-10 border-r border-[#d9d9d9] dark:border-gristDarkBorder">Metrik</th>`;
            years.forEach(year => {
                headHTML += `<th class="p-3 text-right text-xs font-semibold text-gray-500 dark:text-gristDarkMuted uppercase tracking-wider">${year}</th>`;
            });
            headHTML += `<th class="p-3 text-right text-xs font-bold text-gray-700 dark:text-white uppercase tracking-wider border-l border-[#d9d9d9] dark:border-gristDarkBorder">Total Keseluruhan</th></tr>`;
            thead.innerHTML = headHTML;

            // 2. Render Body (Tbody)
            let bodyHTML = '';
            metrics.forEach(metric => {
                bodyHTML += `<tr>
                    <td class="p-3 text-sm font-medium text-gray-900 dark:text-white sticky left-0 bg-white dark:bg-gristDarkBg z-10 border-r border-[#d9d9d9] dark:border-gristDarkBorder capitalize">${metric}</td>`;

                years.forEach(year => {
                    const val = pivotData[metric][year] || 0;
                    bodyHTML += `<td class="p-3 text-sm text-right text-gray-600 dark:text-gray-300 font-mono">${val !== 0 ? fmt(val) : '-'}</td>`;
                });

                bodyHTML += `<td class="p-3 text-sm text-right font-bold text-gray-800 dark:text-white font-mono border-l border-[#d9d9d9] dark:border-gristDarkBorder bg-blue-50/30 dark:bg-blue-900/10">${fmt(pivotData[metric].Total)}</td>
                </tr>`;
            });
            tbody.innerHTML = bodyHTML;

            // 3. Render Footer (Tfoot) - Opsional, untuk Grand Total semua metrik
            let footHTML = `<tr>
                <td class="p-3 text-sm text-right text-gray-900 dark:text-white sticky left-0 bg-gray-50 dark:bg-gristDarkPanel z-10 border-r border-[#d9d9d9] dark:border-gristDarkBorder">Grand Total</td>`;
            years.forEach(year => {
                footHTML += `<td class="p-3 text-sm text-right text-gray-900 dark:text-white font-mono">${fmt(grandTotalsByYear[year])}</td>`;
            });
            footHTML += `<td class="p-3 text-sm text-right font-bold text-gray-900 dark:text-white font-mono border-l border-[#d9d9d9] dark:border-gristDarkBorder">${fmt(grandTotalAll)}</td></tr>`;
            tfoot.innerHTML = footHTML;

            // Tampilkan Tabel
            document.getElementById('loading-panel').classList.add('hidden');
            document.getElementById('pivot-container').classList.remove('hidden');
        }

        // --- INISIALISASI GRIST ---
        grist.ready({ requiredAccess: 'read table' }); // Perbaikan tingkat akses menjadi 'read table'
        grist.onRecords(records => {
            if (records && records.length > 0) {
                processPivot(records);
            } else {
                document.getElementById('loading-panel').innerHTML = '<p>Tidak ada data untuk ditampilkan.</p>';
            }
        });

        // --- TOGGLE TEMA Sederhana ---
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('color-theme', isDark ? 'dark' : 'light');
        });
    </script>
</body>

</html>
